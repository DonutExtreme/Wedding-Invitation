<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Cinematic Wedding Invite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{margin:0;overflow:hidden;font-family:'Inter',sans-serif;-webkit-tap-highlight-color:transparent;}

.bg{position:fixed;inset:0;background:linear-gradient(rgba(255,240,235,0.35), rgba(200,170,150,0.35)),url('https://images.unsplash.com/photo-1523438885200-e635ba2c371e');background-size:cover;background-position:center;z-index:-2;transition:transform 6s ease, filter 2s ease;}

.screen{position:absolute;inset:0;display:flex;justify-content:center;align-items:center;flex-direction:column;transition:opacity 1.2s ease;}
.hidden{opacity:0;pointer-events:none;}

.arch-tunnel{display:flex;gap:40px;}
.arch{width:120px;height:200px;background:url('https://pngimg.com/uploads/wedding_arch/wedding_arch_PNG20.png');background-size:contain;background-repeat:no-repeat;}

.walk{animation:walk 3.5s ease forwards;}
@keyframes walk{0%{transform:scale(1);}100%{transform:scale(2.4);}}

.center-text{position:absolute;bottom:30px;color:white;font-size:14px;}

/* PETALS */
.petal{position:absolute;width:10px;height:10px;background:radial-gradient(circle,#ffd6e0,transparent);border-radius:50%;opacity:0.8;animation:fall linear infinite;}
@keyframes fall{0%{transform:translateY(-10vh);}100%{transform:translateY(110vh) translateX(40px);}}

.title-reveal{position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);color:#fff;text-align:center;opacity:0;transition:opacity 2s ease, transform 2s ease;}
.title-reveal.show{opacity:1;transform:translate(-50%,-65%);} 

.photo-wrap{display:flex;gap:16px;margin-top:15px;}
.photo{width:120px;height:160px;border-radius:15px;overflow:hidden;transform:scale(0.9);transition:transform 6s ease;}
.photo img{width:100%;height:100%;object-fit:cover;}
.photo.zoom{transform:scale(1.05);} /* slow cinematic zoom */

button{margin-top:15px;padding:12px 24px;border-radius:30px;border:none;background:#d6a77a;color:white;font-size:15px;}
.back{position:absolute;top:20px;left:20px;cursor:pointer;font-size:18px;}

.fade-out{opacity:0 !important;}
</style>
</head>
<body>

<div id="bg" class="bg"></div>

<!-- PETALS -->
<script>
for(let i=0;i<35;i++){
 const p=document.createElement('div');
 p.className='petal';
 p.style.left=Math.random()*100+'vw';
 p.style.animationDuration=(5+Math.random()*6)+'s';
 document.body.appendChild(p);
}
</script>

<!-- SCREEN 1 -->
<div id="screen1" class="screen">
  <div id="tunnel" class="arch-tunnel">
    <div class="arch"></div>
    <div class="arch"></div>
    <div class="arch"></div>
  </div>
  <div class="center-text">Tap to enter ✨</div>
</div>

<!-- SCREEN 2 -->
<div id="screen2" class="screen hidden">
  <div class="back" onclick="goBack(1)">←</div>
  <div id="title" class="title-reveal">
    <h1>Name & Name</h1>
    <p>12 December 2026</p>
    <div class="photo-wrap">
      <div class="photo"><img src=""></div>
      <div class="photo"><img src=""></div>
    </div>
    <button onclick="next()">Enter Invitation</button>
  </div>
</div>

<!-- SCREEN 3 -->
<div id="screen3" class="screen hidden">
  <div class="back" onclick="goBack(2)">←</div>
  <h1>Garden Wedding</h1>
  <p>Name & Name</p>
  <p>Date • Time</p>
  <button onclick="openMap()">Location</button>
  <button onclick="rsvp()">RSVP</button>
</div>

<audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>
<audio id="sfx" src="https://cdn.pixabay.com/download/audio/2022/03/10/audio_2b2b3c7c1e.mp3"></audio>

<script>
const tunnel=document.getElementById('tunnel');
const bg=document.getElementById('bg');
const music=document.getElementById('bgm');
const sfx=document.getElementById('sfx');
const title=document.getElementById('title');
const photos=document.querySelectorAll('.photo');
let played=false;

document.getElementById('screen1').onclick=()=>{
 if(played)return;
 played=true;

 music.volume=0;
 music.play();
 sfx.play();
 fadeAudio();

 tunnel.classList.add('walk');
 bg.style.transform='scale(1.25) translateY(-20px)';

 setTimeout(()=>{
   switchScreen(1,2);
   showTitle();
 },3000);
}

function fadeAudio(){
 let v=0;
 const i=setInterval(()=>{
  v+=0.03;
  music.volume=v;
  if(v>=0.6) clearInterval(i);
 },200);
}

function showTitle(){
 title.classList.add('show');
 photos.forEach(p=>p.classList.add('zoom'));
}

function next(){
 title.classList.add('fade-out');
 setTimeout(()=>switchScreen(2,3),1200);
}

function goBack(to){
 if(to===1){switchScreen(2,1);reset();}
 if(to===2){switchScreen(3,2);}
}

function reset(){
 played=false;
 tunnel.classList.remove('walk');
 bg.style.transform='scale(1)';
 music.pause();
 music.currentTime=0;
 title.classList.remove('show','fade-out');
 photos.forEach(p=>p.classList.remove('zoom'));
}

function switchScreen(f,t){
 document.getElementById('screen'+f).classList.add('hidden');
 setTimeout(()=>document.getElementById('screen'+t).classList.remove('hidden'),500);
}

function openMap(){window.open('');}
function rsvp(){window.open('');}
</script>

</body>
</html>
