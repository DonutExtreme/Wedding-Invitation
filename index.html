<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Luxury Cinematic Wedding Invite</title>
  <style>
    body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }

    .screen {
      position: absolute;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      background: rgba(0,0,0,0.35);
      backdrop-filter: blur(14px);
      transition: opacity 1.2s ease;
    }

    .hidden { opacity: 0; pointer-events: none; }

    h1 { font-size: 54px; font-weight: 300; letter-spacing: 2px; }
    p { font-size: 20px; opacity: 0.85; }

    button {
      margin-top: 20px;
      padding: 12px 28px;
      border-radius: 30px;
      border: none;
      background: rgba(255,255,255,0.85);
      color: #333;
      cursor: pointer;
    }

    .back {
      position: absolute;
      top: 20px;
      left: 20px;
      font-size: 24px;
      cursor: pointer;
      opacity: 0.7;
    }

    .back:hover { opacity: 1; }
  </style>
</head>
<body>

<div id="screen1" class="screen">
  <h1>You're Invited</h1>
  <p>to a dreamy celebration</p>
  <button onclick="openInvite()">Enter</button>
</div>

<div id="screen2" class="screen hidden">
  <div class="back" onclick="goBack(1)">←</div>
  <h1>name & name</h1>
  <p>Tap to continue</p>
  <button onclick="showDetails()">Continue</button>
</div>

<div id="screen3" class="screen hidden">
  <div class="back" onclick="goBack(2)">←</div>
  <h1>Garden Wedding</h1>
  <p>12 December 2026 • 7PM</p>
  <button onclick="openMap()">Location</button>
  <button onclick="rsvp()">RSVP</button>
</div>

<audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Soft light
scene.add(new THREE.AmbientLight(0xffffff, 1.3));

// Background image
const loader = new THREE.TextureLoader();
const texture = loader.load('https://images.unsplash.com/photo-1519741497674-611481863552');

const plane = new THREE.Mesh(
  new THREE.PlaneGeometry(7, 4.5),
  new THREE.MeshBasicMaterial({ map: texture })
);
scene.add(plane);

// Petals
const petals = [];
const petalGeo = new THREE.CircleGeometry(0.08, 12);
const petalMat = new THREE.MeshBasicMaterial({ color: 0xffd6e0 });

for (let i = 0; i < 50; i++) {
  const p = new THREE.Mesh(petalGeo, petalMat);
  p.position.set((Math.random()-0.5)*8, Math.random()*5, (Math.random()-0.5)*2);
  scene.add(p);
  petals.push(p);
}

const clock = new THREE.Clock();
let motion = false;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  if (motion) {
    camera.position.x = Math.sin(t * 0.2) * 0.6;
    camera.position.z = 6 + Math.sin(t * 0.3) * 0.6;
  }

  petals.forEach(p => {
    p.position.y -= 0.008;
    if (p.position.y < -3) p.position.y = 3;
  });

  renderer.render(scene, camera);
}
animate();

function openInvite() {
  document.getElementById('bgm').play();
  motion = true;
  switchScreen(1,2);
}

function showDetails() {
  switchScreen(2,3);
}

function goBack(to) {
  if (to === 1) switchScreen(2,1);
  if (to === 2) switchScreen(3,2);
}

function switchScreen(from, to) {
  document.getElementById('screen'+from).classList.add('hidden');
  setTimeout(()=>{
    document.getElementById('screen'+to).classList.remove('hidden');
  }, 500);
}

function openMap() {
  window.open('https://maps.google.com?q=garden+wedding');
}

function rsvp() {
  const msg = encodeURIComponent("Can't wait for your dreamy wedding 🌸");
  window.open(`https://wa.me/?text=${msg}`);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
