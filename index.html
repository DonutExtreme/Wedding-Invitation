<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Wedding Invite</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Inter',sans-serif;overflow:hidden;background:#000;color:#fff;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 1s ease;min-height:100dvh;}
.hidden{opacity:0;pointer-events:none;}

.bg{position:fixed;inset:0;background:url('https://images.unsplash.com/photo-1523438885200-e635ba2c371e') center/cover no-repeat;z-index:-1;transition:transform 4s ease;}
.overlay{position:fixed;inset:0;background:radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.7));z-index:-1;}

.glow{position:absolute;width:300px;height:300px;background:radial-gradient(circle, rgba(255,200,180,0.25), transparent);filter:blur(40px);z-index:-1;}
.glow.top{top:10%;}
.glow.bottom{bottom:10%;}

.arch{width:22vw;max-width:110px;height:28vh;max-height:180px;background:url('https://pngimg.com/uploads/wedding_arch/wedding_arch_PNG20.png') center/contain no-repeat;}
.walk{animation:walk 2s ease forwards;}
@keyframes walk{to{transform:scale(2) translateY(10px);}}

.hero h1{font-family:'Playfair Display',serif;font-size:34px;margin:0;}
.hero p{opacity:0.8;margin:8px 0 20px;}

button{padding:14px 26px;border:none;border-radius:30px;background:#d6a77a;color:#fff;font-size:16px;margin-top:12px;}
.screen button+button{margin-top:10px;}

.banner{position:absolute;top:80px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#f3e5d8,#e0c3a3);padding:18px 30px;border-radius:14px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.25);color:#5a3e2b;}
.banner h1{margin:0;font-size:26px;font-family:'Playfair Display',serif;}
.banner p{margin:6px 0 0;font-size:14px;opacity:0.85;}

.floral{position:absolute;width:120px;height:120px;background-size:contain;background-repeat:no-repeat;opacity:0.9;}
.floral.top-left{top:0;left:0;background-image:url('https://pngimg.com/uploads/flowers/flowers_PNG102.png');}
.floral.top-right{top:0;right:0;transform:scaleX(-1);background-image:url('https://pngimg.com/uploads/flowers/flowers_PNG102.png');}
.floral.bottom-left{bottom:0;left:0;transform:scaleY(-1);background-image:url('https://pngimg.com/uploads/flowers/flowers_PNG102.png');}
.floral.bottom-right{bottom:0;right:0;transform:scale(-1,-1);background-image:url('https://pngimg.com/uploads/flowers/flowers_PNG102.png');}

.petal{position:absolute;width:8px;height:8px;background:radial-gradient(circle,#ffd6e0,transparent);border-radius:50%;opacity:0.6;animation:fall linear infinite;}
@keyframes fall{from{transform:translateY(-10vh);}to{transform:translateY(110vh) translateX(40px);}}

input{padding:12px;border-radius:10px;border:none;margin:6px 0;width:220px;}
.back{position:absolute;top:20px;left:20px;font-size:18px;}
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="overlay"></div>

<script>
const PETALS = window.innerWidth < 500 ? 18 : 26;
for(let i=0;i<PETALS;i++){
  const p=document.createElement('div');
  p.className='petal';
  p.style.left=Math.random()*100+'vw';
  p.style.animationDuration=(5+Math.random()*5)+'s';
  document.body.appendChild(p);
}
</script>

<!-- SCREEN 1 -->
<div id="s1" class="screen hero">
  <div style="display:flex;gap:20px;margin-bottom:20px;">
    <div class="arch"></div>
    <div class="arch"></div>
    <div class="arch"></div>
  </div>
  <h1>You're Invited</h1>
  <p>Tap to begin</p>
  <button onclick="start()">Open Invitation</button>
</div>

<!-- SCREEN 2 -->
<div id="s2" class="screen hidden">
  <div class="glow top"></div>
  <div class="glow bottom"></div>
  <div class="floral top-left"></div>
  <div class="floral top-right"></div>
  <div class="floral bottom-left"></div>
  <div class="floral bottom-right"></div>
  <div class="back" onclick="back(1)">←</div>

  <div class="banner">
    <h1>Name & Name</h1>
    <p>12 December 2026</p>
    <div style="font-size:13px;margin-top:6px;">Together with their families</div>
  </div>

  <div style="margin-top:130px;display:flex;gap:14px;justify-content:center;">
    <div style="width:110px;height:140px;border-radius:14px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,0.3);">
      <img src="https://images.unsplash.com/photo-1519741497674-611481863552" style="width:100%;height:100%;object-fit:cover;">
    </div>
    <div style="width:110px;height:140px;border-radius:14px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,0.3);">
      <img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486" style="width:100%;height:100%;object-fit:cover;">
    </div>
  </div>

  <div style="margin-top:20px;text-align:center;max-width:260px;opacity:0.85;line-height:1.6;">
    "Two souls, one heart, walking together forever"
  </div>

  <button onclick="next()">Continue</button>
</div>

<!-- SCREEN 3 -->
<div id="s3" class="screen hidden">
  <div class="glow top"></div>
  <div class="glow bottom"></div>
  <div class="floral top-left"></div>
  <div class="floral top-right"></div>
  <div class="floral bottom-left"></div>
  <div class="floral bottom-right"></div>
  <div class="back" onclick="back(2)">←</div>

  <div class="banner">
    <h1>Garden Wedding</h1>
    <p>12 Dec 2026 • 5PM</p>
    <div style="font-size:13px;margin-top:6px;">A celebration of love & forever</div>
  </div>

  <div style="margin-top:140px;text-align:center;max-width:260px;opacity:0.85;line-height:1.6;">
    Join us as we begin our beautiful journey together 💫
  </div>

  <button onclick="openMap()">View Location</button>
  <button onclick="showRSVP()">RSVP</button>
</div>

<!-- SCREEN 4 -->
<div id="s4" class="screen hidden">
  <div class="back" onclick="back(3)">←</div>
  <h2>RSVP</h2>
  <input id="rsvpName" placeholder="Your Name">
  <input id="rsvpGuests" placeholder="Guests">
  <button id="rsvpBtn" onclick="submitRSVP()">Submit</button>
</div>

<audio id="bgm" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
const bg=document.getElementById('bg');
const music=document.getElementById('bgm');

function start(){
  document.querySelectorAll('.arch').forEach(a=>a.classList.add('walk'));
  music.play().catch(()=>{});
  fadeAudio();
  bg.style.transform='scale(1.15)';
  setTimeout(()=>switchScreen(1,2),1800);
}

function next(){switchScreen(2,3);} 
function showRSVP(){switchScreen(3,4);} 
function back(n){switchScreen(n+1,n);} 

function switchScreen(from,to){
  const fromEl=document.getElementById('s'+from);
  const toEl=document.getElementById('s'+to);
  if(!fromEl||!toEl) return; // safety
  fromEl.classList.add('hidden');
  setTimeout(()=>toEl.classList.remove('hidden'),300);
}

function fadeAudio(){
  let v=0;
  const i=setInterval(()=>{
    v+=0.03;
    music.volume=v;
    if(v>=0.6) clearInterval(i);
  },200);
}

function openMap(){window.open('https://maps.google.com?q=wedding+location');}
function submitRSVP(){
  const name = document.getElementById('rsvpName').value.trim();
  const guests = document.getElementById('rsvpGuests').value.trim();
  const btn = document.getElementById('rsvpBtn');

  if(!name){
    alert('Please enter your name');
    return;
  }

  btn.disabled = true;
  btn.innerText = 'Submitting...';

  fetch('https://script.google.com/macros/s/AKfycbw1CnKBrkY-RWNK_vFZwV199nqZ6MeEsTizW8wNa0J6dJn9AJLQff_7NZhFrkNKJE_Y8w/exec', {
    method: 'POST',
    body: JSON.stringify({ name, guests })
  })
  .then(()=>{
    alert('RSVP Submitted ❤️');
    document.getElementById('rsvpName').value='';
    document.getElementById('rsvpGuests').value='';
  })
  .catch(()=>{
    alert('Something went wrong 😢');
  })
  .finally(()=>{
    btn.disabled = false;
    btn.innerText = 'Submit';
  });
}

</script>

</body>
</html>
